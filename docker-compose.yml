services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: between_points
      POSTGRES_USER: between_points
      POSTGRES_PASSWORD: between_points
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U between_points -d between_points"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://between_points:between_points@db:5432/between_points
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-https://api.openai.com/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_MOCK_OPENID: ${WECHAT_MOCK_OPENID:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  pgdata:
